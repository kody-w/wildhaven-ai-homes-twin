<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <rect width="192" height="192" fill="#0d1117"/>
  <g transform="translate(96, 96)" stroke="#58a6ff" stroke-width="6" stroke-linejoin="round" fill="none">
    <!-- House silhouette: a home for organisms -->
    <path d="M -52 8 L -52 48 L 52 48 L 52 8 L 0 -42 Z"/>
    <!-- Door -->
    <rect x="-12" y="14" width="24" height="34" fill="#58a6ff" stroke="none"/>
    <!-- Two windows = eyes (the home is awake) -->
    <rect x="-36" y="6" width="14" height="14" fill="#58a6ff" stroke="none"/>
    <rect x="22" y="6" width="14" height="14" fill="#58a6ff" stroke="none"/>
    <!-- Smoke from chimney = signs of life -->
    <path d="M 28 -28 q 0 -8 6 -8 q 6 0 6 -8" stroke="#3fb950" stroke-width="4"/>
  </g>
  <text x="96" y="178" font-family="-apple-system,system-ui,sans-serif" font-size="14" font-weight="600" fill="#8b949e" text-anchor="middle">WAH</text>
</svg>
