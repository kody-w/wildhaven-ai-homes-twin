<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WAH Twin">
<link rel="apple-touch-icon" href="icon-192.svg">
<link rel="icon" type="image/svg+xml" href="icon-192.svg">
<link rel="manifest" href="manifest.webmanifest">
<title>Wildhaven AI Homes — Twin</title>
<style>
  :root {
    --bg: #0d1117;
    --fg: #c9d1d9;
    --muted: #8b949e;
    --accent: #58a6ff;
    --good: #3fb950;
    --bad: #f85149;
    --line: #30363d;
    --card: #161b22;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--fg);
    font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    height: 100vh; overflow: hidden;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  body { display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }

  header {
    padding: 12px 16px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 10px;
    background: var(--bg);
  }
  header .home {
    width: 28px; height: 28px; flex: 0 0 28px;
  }
  header .name { flex: 1; }
  header .name h1 { margin: 0; font-size: 1rem; font-weight: 600; color: #fff; line-height: 1.2; }
  header .name .sub { font-size: 11px; color: var(--muted); }
  header .status {
    font-size: 11px; padding: 4px 8px; border-radius: 999px;
    background: var(--card); border: 1px solid var(--line); color: var(--muted);
  }
  header .status.live { color: var(--good); border-color: var(--good); }
  header .status.offline { color: var(--bad); border-color: var(--bad); }

  #conversation {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .turn {
    max-width: 80%; padding: 10px 14px; border-radius: 14px;
    line-height: 1.45; word-wrap: break-word;
  }
  .turn.user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .turn.twin { align-self: flex-start; background: var(--card); border: 1px solid var(--line); border-bottom-left-radius: 4px; }
  .turn.system { align-self: center; font-size: 12px; color: var(--muted); background: transparent; padding: 4px 0; }

  form {
    display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--line);
    background: var(--bg);
  }
  input[type="text"] {
    flex: 1; background: var(--card); color: var(--fg);
    border: 1px solid var(--line); border-radius: 12px;
    padding: 10px 14px; font: inherit;
    -webkit-appearance: none;
  }
  input[type="text"]:focus { outline: none; border-color: var(--accent); }
  button.send {
    background: var(--accent); color: #fff; border: 0;
    border-radius: 12px; padding: 0 18px; font-weight: 600; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  button.send:disabled { opacity: 0.5; }

  #install-banner {
    display: none;
    background: linear-gradient(135deg, var(--accent), #4493f8); color: #fff;
    padding: 10px 16px; font-size: 13px; align-items: center; gap: 8px;
  }
  #install-banner.show { display: flex; }
  #install-banner button {
    margin-left: auto; background: rgba(255,255,255,0.2); border: 0;
    color: #fff; padding: 6px 12px; border-radius: 8px; cursor: pointer;
    font: 600 12px inherit;
  }

  .meta-link {
    display: block; text-align: center; padding: 8px;
    font-size: 11px; color: var(--muted); text-decoration: none;
  }
  .meta-link:hover { color: var(--accent); }
</style>
</head>
<body>

<div id="install-banner">
  <span>📱 Add to Home Screen for a real app feel — Share → Add to Home Screen (iOS).</span>
  <button onclick="document.getElementById('install-banner').classList.remove('show')">Dismiss</button>
</div>

<header>
  <object class="home" data="icon-192.svg" type="image/svg+xml" aria-hidden="true"></object>
  <div class="name">
    <h1 id="twin-name">Wildhaven AI Homes</h1>
    <div class="sub" id="twin-sub">on-device twin</div>
  </div>
  <span class="status" id="status">checking…</span>
</header>

<div id="conversation">
  <div class="turn system">Connecting to your local brainstem at <code>localhost:7071</code>…</div>
</div>

<form id="composer" autocomplete="off">
  <input id="input" type="text" placeholder="Ask the twin…" autocomplete="off" autocapitalize="sentences">
  <button type="submit" class="send" id="sendBtn">Send</button>
</form>

<a class="meta-link" href="../" target="_top">← back to landing · simulator at <code>../vbrainstem.html</code></a>

<script>
(function(){
  // ── Service worker registration (PWA-ability) ─────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }

  // ── iOS-install banner ────────────────────────────────────────────────
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if (isIOS && !isStandalone) {
    document.getElementById('install-banner').classList.add('show');
  }

  // For non-iOS (Android / desktop Chrome), capture beforeinstallprompt
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    window._wahDeferredInstallPrompt = e;
    const banner = document.getElementById('install-banner');
    banner.querySelector('span').textContent = '📱 Install this twin as an app on your device.';
    const btn = banner.querySelector('button');
    btn.textContent = 'Install';
    btn.onclick = async () => {
      banner.classList.remove('show');
      if (window._wahDeferredInstallPrompt) {
        window._wahDeferredInstallPrompt.prompt();
      }
    };
    banner.classList.add('show');
  });

  // ── Summon-aware: read ?summon= and the shared PAT ─────────────────
  // sessionStorage WAH_PAT is shared with vbrainstem.html on the same origin
  // (same-origin sessionStorage scope = per-tab, so this works when the user
  // opens the app in the same tab they used for the simulator).
  function getPat() {
    try { return sessionStorage.getItem('WAH_PAT') || null; } catch(e) { return null; }
  }
  function authHeaders(extra) {
    const h = Object.assign({Accept: 'application/vnd.github.raw'}, extra || {});
    const pat = getPat();
    if (pat) h.Authorization = `token ${pat}`;
    return h;
  }
  async function fetchTwinMeta(ownerRepo) {
    try {
      const r = await fetch(`https://raw.githubusercontent.com/${ownerRepo}/main/rappid.json`, {cache: 'no-store'});
      if (!r.ok) return null;
      return await r.json();
    } catch(e) { return null; }
  }
  async function applySummon() {
    try {
      const params = new URLSearchParams(window.location.search);
      const ref = params.get('summon');
      if (!ref || !/^[\w.-]+\/[\w.-]+$/.test(ref)) return;
      const meta = await fetchTwinMeta(ref);
      if (!meta) return;
      window.WAH_SUMMON = {ref, ...meta};
      const nameEl = document.getElementById('twin-name');
      const subEl = document.getElementById('twin-sub');
      if (nameEl && meta.name) nameEl.textContent = meta.name;
      if (subEl) subEl.textContent = (meta.kind || 'on-device twin') + (getPat() ? ' · 🔒 operator' : '');
      document.title = (meta.name || 'Twin') + ' — on device';
    } catch(e) { /* non-fatal */ }
  }

  // ── Brainstem detection ───────────────────────────────────────────────
  const BRAINSTEM_URL = 'http://localhost:7071';
  const statusEl = document.getElementById('status');
  const convoEl = document.getElementById('conversation');

  async function probeBrainstem() {
    try {
      const r = await fetch(BRAINSTEM_URL + '/health', {cache: 'no-store', mode: 'cors'});
      if (!r.ok) throw new Error('not ok');
      const data = await r.json();
      statusEl.classList.remove('offline');
      statusEl.classList.add('live');
      statusEl.textContent = 'live · ' + (data.version || 'brainstem');
      return true;
    } catch(e) {
      statusEl.classList.remove('live');
      statusEl.classList.add('offline');
      statusEl.textContent = 'offline';
      return false;
    }
  }

  // ── Chat surface ──────────────────────────────────────────────────────
  function appendTurn(kind, text) {
    const div = document.createElement('div');
    div.className = 'turn ' + kind;
    div.textContent = text;
    convoEl.appendChild(div);
    convoEl.scrollTop = convoEl.scrollHeight;
    return div;
  }

  let history = [];

  async function sendMessage(userInput) {
    appendTurn('user', userInput);
    history.push({role: 'user', content: userInput});
    const sendBtn = document.getElementById('sendBtn');
    sendBtn.disabled = true;
    const placeholder = appendTurn('twin', '…');
    try {
      const r = await fetch(BRAINSTEM_URL + '/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({user_input: userInput, conversation_history: history}),
      });
      if (!r.ok) throw new Error('brainstem returned ' + r.status);
      const data = await r.json();
      const reply = data.response || data.assistant_response || '(no response)';
      placeholder.textContent = reply;
      history.push({role: 'assistant', content: reply});
    } catch(e) {
      placeholder.textContent = 'offline — start the brainstem with: SOUL_PATH=./soul.md AGENTS_PATH=./agents ~/.brainstem/start.sh';
      placeholder.style.color = '#f85149';
    } finally {
      sendBtn.disabled = false;
    }
  }

  document.getElementById('composer').addEventListener('submit', async (e) => {
    e.preventDefault();
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    await sendMessage(text);
  });

  // Boot
  (async () => {
    await applySummon();  // pick up ?summon= and rewrite header
    const live = await probeBrainstem();
    convoEl.innerHTML = '';
    if (live) {
      appendTurn('system', 'Connected. Ask anything.');
      if (window.WAH_SUMMON) {
        appendTurn('system', 'Summoned ' + (window.WAH_SUMMON.name || window.WAH_SUMMON.ref) + (getPat() ? ' (operator view)' : ' (public view)'));
      }
    } else {
      appendTurn('system', 'No local brainstem at ' + BRAINSTEM_URL + '. Install + start with the steps in the simulator\'s "Hatch on device" panel, then refresh.');
    }
  })();

  // Re-probe every 30s in case the brainstem comes online later
  setInterval(probeBrainstem, 30000);
})();
</script>

</body>
</html>
